pre-commit:
  parallel: true
  jobs:
    - name: lint
      glob: "*.{js,ts,jsx,tsx}"
      run: pnpm eslint {staged_files}

    - name: format
      glob: "*.{js,ts,jsx,tsx,json,yml,yaml,md}"
      run: pnpm prettier --check {staged_files}

    - name: secrets
      run: gitleaks protect --staged --no-banner

commit-msg:
  jobs:
    - name: commitlint
      run: pnpm commitlint --edit {1}
